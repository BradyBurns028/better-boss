services:
  frontend:
    container_name: frontend
    restart: unless-stopped
    build:
      context: ./
      dockerfile: Dockerfile
    expose:
      - "3000"
      - "24678"
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    command: 'npm run dev'
    networks:
      - webnet
